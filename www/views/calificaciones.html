<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; 
               connect-src *; 
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               font-src 'self' https://cdn.jsdelivr.net;">

    <title>Módulo - Calificaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/personalizado.css">
</head>

<body class="bg-light">

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand h1 mb-0" href="index.html">
                <i class="bi bi-bank me-2"></i>Escuelita
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto menu-responsivo-custom">
                    <a class="nav-link active" href="../index.html">
                        <i class="bi bi-house-door-fill me-1"></i>Inicio
                    </a>
                    <a class="nav-link" href="alumnos.html">
                        <i class="bi bi-mortarboard-fill me-1"></i>Alumnos
                    </a>
                    <a class="nav-link" href="noticias.html">
                        <i class="bi bi-door-open-fill me-1"></i>Noticias
                    </a>
                    <a class="nav-link" href="salones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Salones
                    </a>
                    <a class="nav-link" href="calificaciones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Calificaciones
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Contenedor Principal -->
    <div class="card shadow-sm p-4">

        <div class="row mb-3 align-items-center">
            <div class="col-12 col-md-6">
                <h3 class="mb-0">📚 Control de Calificaciones (Módulo Completo)</h3>
            </div>
            <div class="col-12 col-md-6 text-end mt-2 mt-md-0">
                <button class="btn btn-success" type="button" data-bs-toggle="collapse"
                    data-bs-target="#form-calificacion" aria-expanded="false" aria-controls="form-calificacion">
                    ➕ Añadir Calificación
                </button>
            </div>
        </div>

        <form id="form-calificacion" class="bg-white p-3 rounded border mb-4 shadow-sm collapse">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-sm-6 col-md-4">
                    <label class="form-label fw-bold text-muted small">
                        <i class="bi bi-person me-1 text-success"></i>Alumno
                    </label>
                    <select id="txt-id-alumno" class="form-select" required>
                        <option value="" selected disabled>Selecciona un alumno...</option>
                        <option value="1">Juan Pérez (260501)</option>
                        <option value="2">María López (260502)</option>
                    </select>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                    <label class="form-label fw-bold text-muted small">
                        <i class="bi bi-journal-bookmark me-1 text-success"></i>Materia
                    </label>
                    <select id="txt-id-materia" class="form-select" required>
                        <option value="" selected disabled>Selecciona una materia...</option>
                        <option value="101">Desarrollo de Aplicaciones Móviles</option>
                        <option value="102">Gestión de Proyectos de Software</option>
                    </select>
                </div>

                <div class="col-12 col-sm-6 col-md-2">
                    <label class="form-label fw-bold text-muted small">
                        <i class="bi bi-award me-1 text-success"></i>Calificación
                    </label>
                    <input type="number" id="txt-calificacion" class="form-control" placeholder="Ej: 9.5" min="0"
                        max="10" step="0.1" required>
                </div>

                <div class="col-12 col-sm-6 col-md-2">
                    <button type="submit" class="btn btn-success w-100 shadow-sm" title="Guardar Calificación"
                        style="height: 38px;">
                        <i class="bi bi-floppy-fill"></i> Guardar
                    </button>
                </div>

            </div>
        </form>

        <div class="mb-3">
            <input type="text" id="txt-buscar-calificacion" class="form-control"
                placeholder="🔍 Buscar calificación por ID, alumno o materia...">
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>ID Alumno</th>
                        <th>ID Materia</th>
                        <th>Calificación</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-calificaciones-body">
                </tbody>
            </table>
        </div>

    </div>

    <!-- Scripts y dependencias -->
    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../cordova.js"></script>
    <script src="../js/calificaciones.js"></script>

</body>

</html>
