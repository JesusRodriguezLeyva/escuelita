<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; 
               connect-src *; 
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               font-src 'self' https://cdn.jsdelivr.net;">

    <title>Módulo - Alumnos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/personalizado.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand h1 mb-0" href="index.html">
                <i class="bi bi-bank me-2"></i>Escuelita
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto menu-responsivo-custom">
                    <a class="nav-link active" href="../index.html">
                        <i class="bi bi-house-door-fill me-1"></i>Inicio
                    </a>
                    <a class="nav-link" href="alumnos.html">
                        <i class="bi bi-mortarboard-fill me-1"></i>Alumnos
                    </a>
                    <a class="nav-link" href="noticias.html">
                        <i class="bi bi-door-open-fill me-1"></i>Noticias
                    </a>
                    <a class="nav-link" href="salones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Salones
                    </a>
                    <a class="nav-link" href="calificaciones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Calificaciones
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm p-4">

            <div class="row mb-3 align-items-center">
                <div class="col-12 col-md-6">
                    <h3><i class="bi bi-people-fill me-2 text-primary"></i>Control de Alumnos (Módulo Completo)</h3>
                </div>
                <div class="col-12 col-md-6 text-md-end mt-2 mt-md-0">
                    <span class="badge bg-secondary p-2"><i class="bi bi-sliders me-1"></i>Formulario Activo</span>
                </div>
            </div>

            <form id="form-alumno" class="bg-white p-3 rounded border mb-4 shadow-sm">
                <div class="row g-2 align-items-end">
                    <div class="col-12 col-sm-4 col-md-2">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-card-text me-1 text-success"></i>Matrícula</label>
                        <input type="text" id="txt-matricula" class="form-control" placeholder="Ej: 260501" required>
                    </div>
                    <div class="col-12 col-sm-8 col-md-2">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-person me-1 text-success"></i>Nombre(s)</label>
                        <input type="text" id="txt-nombre" class="form-control" placeholder="Juan Carlos" required>
                    </div>
                    <div class="col-12 col-sm-6 col-md-2">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-person-vcard me-1 text-success"></i>Apellido Paterno</label>
                        <input type="text" id="txt-apellido-paterno" class="form-control" placeholder="Pérez" required>
                    </div>
                    <div class="col-12 col-sm-6 col-md-2">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-person-vcard me-1 text-success"></i>Apellido Materno</label>
                        <input type="text" id="txt-apellido-materno" class="form-control" placeholder="López" required>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-journal-bookmark me-1 text-success"></i>Carrera</label>
                        <select id="txt-carrera" class="form-select" required>
                            <option value="" selected disabled>Selecciona...</option>
                            <option value="Ingeniería en Software">Ingeniería en Software</option>
                            <option value="Sistemas Computacionales">Sistemas Computacionales</option>
                            <option value="Lic. en Administración">Lic. en Administración</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-1 text-end mt-3 mt-md-0">
                        <button type="submit" class="btn btn-success w-100 py-2 shadow-sm" title="Guardar Alumno">
                            <i class="bi bi-floppy-fill"></i>
                            <span class="d-md-none d-lg-none d-lg-inline ms-1">Guardar</span>
                        </button>
                    </div>
                </div>
            </form>

            <div class="mb-3 input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="txt-buscar-alumno" class="form-control border-start-0"
                    placeholder="Buscar alumno por nombre o matrícula...">
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Matrícula</th>
                            <th>Nombre Completo</th>
                            <th class="d-none d-md-table-cell">Carrera</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-alumnos-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../cordova.js"></script>

    <script src="../js/alumnos.js"></script>
</body>

</html>
