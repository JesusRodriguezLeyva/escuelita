<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; 
               connect-src *; 
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
               font-src 'self' https://cdn.jsdelivr.net;">

    <title>Módulo - Salones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand h1 mb-0" href="index.html">
                <i class="bi bi-bank me-2"></i>Escuelita
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto menu-responsivo-custom">
                    <a class="nav-link active" href="../index.html">
                        <i class="bi bi-house-door-fill me-1"></i>Inicio
                    </a>
                    <a class="nav-link" href="alumnos.html">
                        <i class="bi bi-mortarboard-fill me-1"></i>Alumnos
                    </a>
                    <a class="nav-link" href="noticias.html">
                        <i class="bi bi-door-open-fill me-1"></i>Noticias
                    </a>
                    <a class="nav-link" href="salones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Salones
                    </a>
                    <a class="nav-link" href="calificaciones.html">
                        <i class="bi bi-door-open-fill me-1"></i>Calificaciones
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm p-4">

            <div class="row mb-3 align-items-center">
                <div class="col-12 col-md-6">
                    <h3><i class="bi bi-door-open-fill me-2 text-primary"></i>Control de Salones (Módulo Completo)</h3>
                </div>
                <div class="col-12 col-md-6 text-md-end mt-2 mt-md-0">
                    <span class="badge bg-secondary p-2"><i class="bi bi-sliders me-1"></i>Formulario Activo</span>
                </div>
            </div>

            <form id="form-salon" class="bg-white p-3 rounded border mb-4 shadow-sm">
                <div class="row g-2 align-items-end">

                    <div class="col-12 col-sm-4 col-md-2">
                        <label class="form-label fw-bold text-muted small"><i class="bi bi-key me-1 text-success"></i>ID
                            Salón</label>
                        <input type="text" class="form-control bg-light" placeholder="Auto" disabled>
                    </div>

                    <div class="col-12 col-sm-8 col-md-5">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-fonts me-1 text-success"></i>Nombre del Aula / Salón</label>
                        <input type="text" id="txt-nombre-aula" class="form-control"
                            placeholder="Ej: Laboratorio A, Aula 104" required>
                    </div>

                    <div class="col-12 col-sm-12 col-md-4">
                        <label class="form-label fw-bold text-muted small"><i
                                class="bi bi-building me-1 text-success"></i>Edificio</label>
                        <select id="txt-edificio" class="form-select" required>
                            <option value="" selected disabled>Selecciona el edificio...</option>
                            <option value="Edificio A">Edificio A</option>
                            <option value="Edificio B">Edificio B</option>
                            <option value="Edificio C">Edificio C</option>
                            <option value="Edificio de Laboratorios">Edificio de Laboratorios</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-1 text-end mt-3 mt-md-0">
                        <button type="submit" class="btn btn-success w-100 py-2 shadow-sm" title="Guardar Salón">
                            <i class="bi bi-floppy-fill"></i>
                            <span class="d-md-none d-lg-none ms-1">Guardar</span>
                        </button>
                    </div>

                </div>
            </form>

            <div class="mb-3 input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="txt-buscar-salon" class="form-control border-start-0"
                    placeholder="Buscar salón por nombre o edificio...">
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID Salón</th>
                            <th>Nombre Aula</th>
                            <th class="d-none d-md-table-cell">Edificio</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-salones-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../cordova.js"></script>

    <script src="../js/salones.js"></script>
</body>

</html>
